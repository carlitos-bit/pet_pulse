
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área de Dúvidas</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-black border-bottom border-danger py-3">
        <div class="container d-flex justify-content-between align-items-center">

            <h2 class="text-danger fw-bold m-0 d-flex align-items-center gap-2">
                ❓ DÚVIDAS
            </h2>

            <a href="index.html" class="btn btn-danger">
                ← Voltar ao Site
            </a>

        </div>
    </nav>

    <!-- MAIN -->
    <main class="container py-5">

        <div class="card bg-dark border border-danger text-white shadow-lg rounded-4">
            <div class="card-body p-4">

                <h3 class="text-center text-danger fw-bold mb-4">
                    Tire sua dúvida
                </h3>

                <form>

                    <!-- NOME -->
                    <div class="mb-3">
                        <label class="form-label">Seu Nome</label>
                        <input type="text" class="form-control bg-dark text-white border-danger" placeholder="Digite seu nome">
                    </div>

                    <!-- EMAIL -->
                    <div class="mb-3">
                        <label class="form-label">Seu E-mail</label>
                        <input type="email" class="form-control bg-dark text-white border-danger" placeholder="Digite seu e-mail">
                    </div>

                    <!-- DÚVIDAS FREQUENTES -->
                    <div class="mb-3">
                        <label class="form-label">Escolha uma dúvida frequente</label>

                        <select class="form-select bg-dark text-white border-danger">
                            <option selected>Selecione uma opção</option>
                            <option>Quais vacinas meu pet precisa?</option>
                            <option>Como funciona a consulta veterinária?</option>
                            <option>Vocês atendem emergências?</option>
                            <option>Quais exames são realizados na clínica?</option>
                            <option>Como agendar banho e tosa?</option>
                            <option>Meu pet precisa de atendimento urgente</option>
                            <option>Outras dúvidas</option>
                        </select>
                    </div>

                    <!-- MENSAGEM -->
                    <div class="mb-4">
                        <label class="form-label">Descreva sua dúvida</label>

                        <textarea class="form-control bg-dark text-white border-danger" rows="5" placeholder="Digite aqui sua dúvida..."></textarea>
                    </div>

                    <!-- BOTÃO -->
                    <div class="text-center">
                        <button type="submit" class="btn btn-danger px-5 fw-bold">
                            Enviar Dúvida
                        </button>
                    </div>

                </form>

            </div>
        </div>

    </main>

    <!-- FOOTER -->
    <footer class="bg-black border-top border-danger text-center py-4 mt-5">
        <div class="container">

            <h5 class="text-danger fw-bold">
                Agradecimentos
            </h5>

            <p class="mb-1">
                Obrigado por visitar nossa área de dúvidas.
            </p>

            <p>
                Estamos sempre prontos para ajudar você!
            </p>

            <small class="text-secondary">
                © 2026 - Todos os direitos reservados.
            </small>

        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
